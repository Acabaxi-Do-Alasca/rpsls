<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RPSLS — Rock Paper Scissors Lizard Spock</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d14;
      --surface: #13131e;
      --surface2: #1a1a28;
      --surface3: #222235;
      --border: rgba(255,255,255,0.08);
      --text: #e8e8f0;
      --muted: #7a7a99;
      --faint: #3a3a55;
      --accent: #7c6af7;
      --accent-glow: rgba(124,106,247,0.35);
      --accent2: #f76a8a;
      --win: #4ade80;
      --lose: #f87171;
      --draw: #fbbf24;
      --win-bg: rgba(74,222,128,0.1);
      --lose-bg: rgba(248,113,113,0.1);
      --draw-bg: rgba(251,191,36,0.1);
      --radius: 1rem;
      --font: 'Satoshi', sans-serif;
      --ease: cubic-bezier(0.34,1.56,0.64,1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-font-smoothing: antialiased; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100dvh; overflow-x: hidden; }

    /* BG glow */
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: radial-gradient(ellipse 60% 40% at 50% 0%, rgba(124,106,247,0.12) 0%, transparent 70%);
    }

    .app { position: relative; z-index: 1; max-width: 680px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }

    /* HEADER */
    .header { text-align: center; margin-bottom: 2rem; }
    .logo-row { display: flex; align-items: center; justify-content: center; gap: .6rem; margin-bottom: .5rem; }
    .logo-icon { width: 36px; height: 36px; }
    .title { font-size: clamp(1.4rem, 4vw, 2rem); font-weight: 900; letter-spacing: -.02em; }
    .title em { font-style: normal; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .subtitle { font-size: .85rem; color: var(--muted); letter-spacing: .04em; text-transform: uppercase; }

    /* SCORE */
    .scoreboard {
      display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: .5rem;
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 1rem 1.5rem; margin-bottom: 1.5rem;
    }
    .score-side { text-align: center; }
    .score-who { font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: .25rem; }
    .score-num { font-size: 2.2rem; font-weight: 900; line-height: 1; }
    .score-num.you { color: var(--accent); }
    .score-num.ai  { color: var(--accent2); }
    .score-vs { font-size: .85rem; font-weight: 700; color: var(--faint); }

    /* ARENA */
    .arena {
      display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 1rem;
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 1.5rem 1rem; margin-bottom: 1.5rem; min-height: 140px;
    }
    .arena-slot { text-align: center; }
    .arena-label { font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: .5rem; }
    .arena-choice {
      font-size: 3.5rem; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      width: 80px; height: 80px; margin: 0 auto;
      border-radius: 50%;
      background: var(--surface2);
      border: 2px solid var(--border);
      transition: all .3s var(--ease);
    }
    .arena-choice.you-choice { border-color: var(--accent); box-shadow: 0 0 24px var(--accent-glow); }
    .arena-choice.ai-choice  { border-color: var(--accent2); box-shadow: 0 0 24px rgba(247,106,138,0.3); }

    @keyframes pop { 0%{transform:scale(0.3) rotate(-20deg);opacity:0} 70%{transform:scale(1.15) rotate(3deg)} 100%{transform:scale(1) rotate(0deg);opacity:1} }
    @keyframes shake { 0%,100%{transform:rotate(0)} 25%{transform:rotate(-8deg)} 75%{transform:rotate(8deg)} }
    .pop { animation: pop .45s var(--ease) forwards; }
    .shake { animation: shake .12s linear 4; }

    .vs-badge { font-size: .9rem; font-weight: 900; color: var(--faint); letter-spacing: .1em; }

    /* RESULT BANNER */
    .result-banner {
      text-align: center; padding: .75rem 1rem;
      border-radius: .75rem; margin-bottom: 1.5rem;
      font-weight: 700; font-size: 1.05rem;
      opacity: 0; transform: translateY(6px);
      transition: all .3s ease;
    }
    .result-banner.show { opacity: 1; transform: translateY(0); }
    .result-banner.win  { background: var(--win-bg);  color: var(--win);  border: 1px solid rgba(74,222,128,.25); }
    .result-banner.lose { background: var(--lose-bg); color: var(--lose); border: 1px solid rgba(248,113,113,.25); }
    .result-banner.draw { background: var(--draw-bg); color: var(--draw); border: 1px solid rgba(251,191,36,.25); }

    /* CHOICES */
    .choices-label { font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); text-align: center; margin-bottom: .75rem; }
    .choices {
      display: grid; grid-template-columns: repeat(5, 1fr); gap: .6rem; margin-bottom: 1.5rem;
    }
    @media (max-width: 480px) { .choices { grid-template-columns: repeat(5, 1fr); gap: .4rem; } }
    .choice-btn {
      aspect-ratio: 1; border-radius: .75rem; border: 2px solid var(--border);
      background: var(--surface); display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: .25rem; cursor: pointer; transition: all .18s var(--ease); position: relative; overflow: hidden;
    }
    .choice-btn::before { content: ''; position: absolute; inset: 0; background: var(--accent); opacity: 0; transition: opacity .18s; }
    .choice-btn:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 8px 24px var(--accent-glow); }
    .choice-btn:hover::before { opacity: .08; }
    .choice-btn:active { transform: translateY(0) scale(.95); }
    .choice-btn.selected { border-color: var(--accent); background: rgba(124,106,247,.12); box-shadow: 0 0 20px var(--accent-glow); }
    .choice-btn.disabled { pointer-events: none; opacity: .4; }
    .choice-emoji { font-size: clamp(1.4rem, 4vw, 2rem); line-height: 1; position: relative; z-index: 1; }
    .choice-name { font-size: .6rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); position: relative; z-index: 1; }
    @media (max-width: 380px) { .choice-name { display: none; } }

    /* RULES */
    .rules-toggle { display: flex; align-items: center; justify-content: center; gap: .4rem; width: 100%; padding: .6rem; background: var(--surface); border: 1px solid var(--border); border-radius: .75rem; color: var(--muted); font-size: .8rem; font-weight: 600; cursor: pointer; margin-bottom: .75rem; transition: all .18s; }
    .rules-toggle:hover { color: var(--text); border-color: var(--accent); }
    .rules-toggle svg { transition: transform .25s; }
    .rules-toggle.open svg { transform: rotate(180deg); }
    .rules-box {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 1rem; margin-bottom: 1.5rem; display: none;
    }
    .rules-box.open { display: block; }
    .rules-title { font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: .75rem; }
    .rules-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: .35rem; }
    @media (max-width: 420px) { .rules-grid { grid-template-columns: 1fr; } }
    .rule-item { font-size: .78rem; color: var(--muted); display: flex; align-items: center; gap: .4rem; }
    .rule-item strong { color: var(--text); }

    /* HISTORY */
    .history-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
    .history-title { font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }
    .clear-btn { font-size: .72rem; color: var(--muted); padding: .25rem .6rem; border-radius: .4rem; border: 1px solid var(--border); background: none; cursor: pointer; transition: all .18s; }
    .clear-btn:hover { color: var(--lose); border-color: var(--lose); }
    .history-list { display: flex; flex-direction: column; gap: .4rem; max-height: 260px; overflow-y: auto; }
    .history-list::-webkit-scrollbar { width: 4px; }
    .history-list::-webkit-scrollbar-track { background: var(--surface); }
    .history-list::-webkit-scrollbar-thumb { background: var(--faint); border-radius: 2px; }
    .history-item {
      display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: .75rem;
      padding: .5rem .75rem; border-radius: .6rem;
      background: var(--surface); border: 1px solid var(--border);
      font-size: .82rem; animation: slideIn .25s var(--ease);
    }
    @keyframes slideIn { from { opacity:0; transform:translateX(-12px); } to { opacity:1; transform:none; } }
    .history-item.win  { border-color: rgba(74,222,128,.2);  }
    .history-item.lose { border-color: rgba(248,113,113,.2); }
    .history-item.draw { border-color: rgba(251,191,36,.2);  }
    .h-round { font-size: .68rem; color: var(--muted); font-weight: 700; }
    .h-moves { display: flex; align-items: center; gap: .4rem; color: var(--text); font-weight: 500; }
    .h-moves span { font-size: .95rem; }
    .h-desc { font-size: .72rem; color: var(--muted); }
    .h-badge { font-size: .68rem; font-weight: 800; padding: .2rem .5rem; border-radius: .4rem; text-transform: uppercase; letter-spacing: .06em; white-space: nowrap; }
    .h-badge.win  { background: var(--win-bg);  color: var(--win); }
    .h-badge.lose { background: var(--lose-bg); color: var(--lose); }
    .h-badge.draw { background: var(--draw-bg); color: var(--draw); }

    .empty-history { text-align: center; padding: 2rem; color: var(--faint); font-size: .85rem; }

    /* CONFETTI */
    .confetti-piece {
      position: fixed; width: 10px; height: 10px; top: -10px; border-radius: 2px;
      animation: fall linear forwards; pointer-events: none; z-index: 999;
    }
    @keyframes fall {
      to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header class="header">
    <div class="logo-row">
      <svg class="logo-icon" viewBox="0 0 36 36" fill="none">
        <circle cx="18" cy="18" r="17" stroke="url(#lg)" stroke-width="2"/>
        <text x="18" y="24" text-anchor="middle" font-size="16">🖖</text>
        <defs><linearGradient id="lg" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse"><stop stop-color="#7c6af7"/><stop offset="1" stop-color="#f76a8a"/></linearGradient></defs>
      </svg>
      <h1 class="title"><em>RPSLS</em></h1>
    </div>
    <p class="subtitle">Rock · Paper · Scissors · Lizard · Spock</p>
  </header>

  <!-- SCORE -->
  <div class="scoreboard">
    <div class="score-side">
      <div class="score-who">Você</div>
      <div class="score-num you" id="score-you">0</div>
    </div>
    <div class="score-vs">VS</div>
    <div class="score-side">
      <div class="score-who">IA</div>
      <div class="score-num ai" id="score-ai">0</div>
    </div>
  </div>

  <!-- ARENA -->
  <div class="arena">
    <div class="arena-slot">
      <div class="arena-label">Você</div>
      <div class="arena-choice" id="arena-you">❓</div>
    </div>
    <div class="vs-badge">VS</div>
    <div class="arena-slot">
      <div class="arena-label">IA</div>
      <div class="arena-choice" id="arena-ai">❓</div>
    </div>
  </div>

  <!-- RESULT -->
  <div class="result-banner" id="result-banner">Escolha uma opção!</div>

  <!-- CHOICES -->
  <p class="choices-label">Sua jogada</p>
  <div class="choices" id="choices"></div>

  <!-- RULES -->
  <button class="rules-toggle" id="rules-toggle" onclick="toggleRules()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
    Ver regras do jogo
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m6 9 6 6 6-6"/></svg>
  </button>
  <div class="rules-box" id="rules-box">
    <p class="rules-title">Quem vence quem</p>
    <div class="rules-grid" id="rules-grid"></div>
  </div>

  <!-- HISTORY -->
  <div>
    <div class="history-header">
      <span class="history-title">Histórico de partidas</span>
      <button class="clear-btn" onclick="clearHistory()">Limpar</button>
    </div>
    <div class="history-list" id="history-list">
      <div class="empty-history">Nenhuma partida ainda.<br>Faça sua primeira jogada! 👆</div>
    </div>
  </div>
</div>

<script>
const CHOICES = [
  { id: 'rock',     emoji: '🪨', name: 'Pedra' },
  { id: 'paper',   emoji: '📄', name: 'Papel' },
  { id: 'scissors',emoji: '✂️', name: 'Tesoura' },
  { id: 'lizard',  emoji: '🦎', name: 'Lagarto' },
  { id: 'spock',   emoji: '🖖', name: 'Spock' },
];

// result[a][b] = { win: bool, desc: string }
const RULES = {
  scissors: { paper:   { win:true,  desc:'Tesoura corta Papel' },
               lizard:  { win:true,  desc:'Tesoura decapita Lagarto' },
               rock:    { win:false, desc:'Pedra esmaga Tesoura' },
               spock:   { win:false, desc:'Spock esmaga Tesoura' },
               scissors:{ win:null,  desc:'Empate' } },
  paper:    { rock:    { win:true,  desc:'Papel cobre Pedra' },
               spock:   { win:true,  desc:'Papel refuta Spock' },
               scissors:{ win:false, desc:'Tesoura corta Papel' },
               lizard:  { win:false, desc:'Lagarto come Papel' },
               paper:   { win:null,  desc:'Empate' } },
  rock:     { scissors:{ win:true,  desc:'Pedra esmaga Tesoura' },
               lizard:  { win:true,  desc:'Pedra esmaga Lagarto' },
               paper:   { win:false, desc:'Papel cobre Pedra' },
               spock:   { win:false, desc:'Spock vaporiza Pedra' },
               rock:    { win:null,  desc:'Empate' } },
  lizard:   { paper:   { win:true,  desc:'Lagarto come Papel' },
               spock:   { win:true,  desc:'Lagarto envenena Spock' },
               rock:    { win:false, desc:'Pedra esmaga Lagarto' },
               scissors:{ win:false, desc:'Tesoura decapita Lagarto' },
               lizard:  { win:null,  desc:'Empate' } },
  spock:    { rock:    { win:true,  desc:'Spock vaporiza Pedra' },
               scissors:{ win:true,  desc:'Spock esmaga Tesoura' },
               paper:   { win:false, desc:'Papel refuta Spock' },
               lizard:  { win:false, desc:'Lagarto envenena Spock' },
               spock:   { win:null,  desc:'Empate' } },
};

const ALL_RULES_LIST = [
  'Tesoura corta Papel','Papel cobre Pedra','Pedra esmaga Lagarto',
  'Lagarto envenena Spock','Spock esmaga Tesoura','Tesoura decapita Lagarto',
  'Lagarto come Papel','Papel refuta Spock','Spock vaporiza Pedra','Pedra esmaga Tesoura'
];

let scoreYou = 0, scoreAI = 0, round = 0;
let history = [];
let locked = false;

function getEmoji(id) { return CHOICES.find(c=>c.id===id).emoji; }
function getName(id)  { return CHOICES.find(c=>c.id===id).name; }

// Build choice buttons
(function buildChoices(){
  const container = document.getElementById('choices');
  CHOICES.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn'; btn.id = 'btn-'+c.id;
    btn.setAttribute('aria-label', c.name);
    btn.innerHTML = `<span class="choice-emoji">${c.emoji}</span><span class="choice-name">${c.name}</span>`;
    btn.onclick = () => play(c.id);
    container.appendChild(btn);
  });
})();

// Build rules list
(function buildRules(){
  const grid = document.getElementById('rules-grid');
  ALL_RULES_LIST.forEach(r => {
    const d = document.createElement('div'); d.className = 'rule-item';
    d.innerHTML = `<span style="color:var(--accent)">→</span> <span>${r}</span>`;
    grid.appendChild(d);
  });
})();

function toggleRules(){
  const btn = document.getElementById('rules-toggle');
  const box = document.getElementById('rules-box');
  btn.classList.toggle('open'); box.classList.toggle('open');
}

function play(youId) {
  if (locked) return;
  locked = true;
  round++;

  // Highlight selected
  CHOICES.forEach(c => document.getElementById('btn-'+c.id).classList.add('disabled'));
  document.getElementById('btn-'+youId).classList.add('selected');

  // AI random
  const aiId = CHOICES[Math.floor(Math.random()*5)].id;

  // Animate arena — thinking dots first
  const arenaYou = document.getElementById('arena-you');
  const arenaAI  = document.getElementById('arena-ai');
  arenaYou.textContent = '⏳'; arenaAI.textContent = '⏳';
  arenaYou.className = 'arena-choice shake'; arenaAI.className = 'arena-choice shake';

  setTimeout(() => {
    arenaYou.textContent = getEmoji(youId);
    arenaYou.className = 'arena-choice you-choice pop';
    arenaAI.textContent = getEmoji(aiId);
    arenaAI.className = 'arena-choice ai-choice pop';

    const result = RULES[youId][aiId];
    const banner = document.getElementById('result-banner');
    banner.className = 'result-banner';
    void banner.offsetWidth;

    let outcome, label, msg;
    if (result.win === null) {
      outcome = 'draw'; label = '🤝 Empate!'; msg = result.desc;
    } else if (result.win) {
      outcome = 'win'; label = '🎉 Você venceu!'; msg = result.desc;
      scoreYou++;
      setTimeout(confetti, 200);
    } else {
      outcome = 'lose'; label = '😬 IA venceu!'; msg = result.desc;
      scoreAI++;
    }

    document.getElementById('score-you').textContent = scoreYou;
    document.getElementById('score-ai').textContent  = scoreAI;

    banner.textContent = `${label} — ${msg}`;
    banner.className = `result-banner ${outcome} show`;

    addHistory(round, youId, aiId, outcome, msg);

    // Unlock after delay
    setTimeout(() => {
      CHOICES.forEach(c => {
        const b = document.getElementById('btn-'+c.id);
        b.classList.remove('disabled','selected');
      });
      locked = false;
    }, 900);
  }, 550);
}

function addHistory(r, youId, aiId, outcome, desc) {
  history.unshift({ r, youId, aiId, outcome, desc });
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById('history-list');
  if (!history.length) {
    list.innerHTML = '<div class="empty-history">Nenhuma partida ainda.<br>Faça sua primeira jogada! 👆</div>';
    return;
  }
  list.innerHTML = history.map(h => `
    <div class="history-item ${h.outcome}">
      <span class="h-round">#${h.r}</span>
      <div>
        <div class="h-moves">
          <span>${getEmoji(h.youId)}</span>
          <span style="color:var(--faint);font-size:.7rem">vs</span>
          <span>${getEmoji(h.aiId)}</span>
          <span style="font-size:.72rem;color:var(--muted)">${getName(h.youId)} × ${getName(h.aiId)}</span>
        </div>
        <div class="h-desc">${h.desc}</div>
      </div>
      <span class="h-badge ${h.outcome}">${h.outcome==='win'?'Ganhou':h.outcome==='lose'?'Perdeu':'Empate'}</span>
    </div>
  `).join('');
}

function clearHistory() {
  history = []; scoreYou = 0; scoreAI = 0; round = 0;
  document.getElementById('score-you').textContent = '0';
  document.getElementById('score-ai').textContent  = '0';
  document.getElementById('arena-you').textContent = '❓';
  document.getElementById('arena-you').className   = 'arena-choice';
  document.getElementById('arena-ai').textContent  = '❓';
  document.getElementById('arena-ai').className    = 'arena-choice';
  const banner = document.getElementById('result-banner');
  banner.className = 'result-banner'; banner.textContent = 'Escolha uma opção!';
  renderHistory();
}

function confetti() {
  const colors = ['#7c6af7','#f76a8a','#4ade80','#fbbf24','#60a5fa','#f472b6'];
  for (let i = 0; i < 38; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random()*100+'vw';
    el.style.background = colors[Math.floor(Math.random()*colors.length)];
    el.style.width = (6+Math.random()*8)+'px';
    el.style.height = (6+Math.random()*8)+'px';
    el.style.borderRadius = Math.random()>.5 ? '50%' : '2px';
    el.style.animationDuration = (1.2+Math.random()*1.4)+'s';
    el.style.animationDelay = (Math.random()*.5)+'s';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), 3000);
  }
}
</script>
</body>
</html>
